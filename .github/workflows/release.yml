name: Create Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to run'
        required: true
        default: check-only
        type: choice
        options:
          - check-only
          - tag-release
          - and-push-nuget
      version:
        description: 'Version (e.g. 1.2.3). Blank for auto.'
        required: false
      bump:
        description: 'Part to bump if blank.'
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      suffix:
        description: 'Pre-release suffix (e.g. test). Blank for stable.'
        required: false
      prerelease:
        description: 'Mark as pre-release on GitHub?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            BASE="${{ inputs.version }}"
          else
            LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            LAST=${LAST:-v0.0.0}
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac
            BASE="${MAJOR}.${MINOR}.${PATCH}"
          fi

          if [[ -n "${{ inputs.suffix }}" ]]; then
            VERSION="${BASE}-${{ inputs.suffix }}"
          else
            VERSION="${BASE}"
          fi

          echo "VERSION=$VERSION"
          echo "TAG=v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Confirm tag does not already exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists!"
            exit 1
          fi

  tag-release:
    name: Tag and create GitHub Release
    needs: check-version
    if: inputs.mode == 'tag-release' || inputs.mode == 'and-push-nuget'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check-version.outputs.tag }}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "${{ needs.check-version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ inputs.prerelease }}" == "true" || -n "${{ inputs.suffix }}" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          for attempt in 1 2 3; do
            gh release create "${{ needs.check-version.outputs.tag }}" \
              --title "v${{ needs.check-version.outputs.version }}" \
              --generate-notes \
              $PRERELEASE_FLAG && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

  push-nuget:
    name: Publish to NuGet
    needs: [check-version, tag-release]
    if: inputs.mode == 'and-push-nuget'
    uses: ./.github/workflows/push.yml
    with:
      version: ${{ needs.check-version.outputs.version }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
