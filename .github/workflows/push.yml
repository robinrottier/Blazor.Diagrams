name: PushToNuget
env:
  NUGET_DIR: '${{ github.workspace }}/nuget'

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  pack:
    name: Pack NuGet packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10'

      - name: Set version from tag
        run: |
          BRANCH=$(git branch -r --contains HEAD | grep 'origin/main' || true)
          echo GIT BRANCH:      $BRANCH
          echo GITHUB_REF:      ${GITHUB_REF}
          echo GITHUB_REF_NAME: ${GITHUB_REF_NAME}
          if [[ -z "$BRANCH" ]]; then
            echo "Tag is not on main branch, aborting."
            exit 1
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            echo "Unrecognized version, aborting"
            exit 1
          fi
          echo VERSION:         $VERSION
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Pack Blazor.Diagrams.Core
        working-directory: src/Blazor.Diagrams.Core
        run: dotnet pack -p:GeneratePackageOnBuild=false --configuration Release -p:Version=${{ env.VERSION }} --output ${{ env.NUGET_DIR }}

      - name: Pack Blazor.Diagrams
        working-directory: src/Blazor.Diagrams
        run: dotnet pack -p:GeneratePackageOnBuild=false --configuration Release -p:Version=${{ env.VERSION }} --output ${{ env.NUGET_DIR }}

      - name: Pack Blazor.Diagrams.Algorithms
        working-directory: src/Blazor.Diagrams.Algorithms
        run: dotnet pack -p:GeneratePackageOnBuild=false --configuration Release -p:Version=${{ env.VERSION }} --output ${{ env.NUGET_DIR }}

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.NUGET_DIR }}/*.nupkg
          retention-days: 7

  publish:
    name: Publish to NuGet
    needs: pack
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.NUGET_DIR }}

      - name: Get OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Push to NuGet
        run: |
          for i in $(find ${{ env.NUGET_DIR }} -type f -name "*.nupkg"); do
            echo "Pushing: ${i}"
            dotnet nuget push $i --api-key "${{ steps.oidc.outputs.token }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
