name: Build, Test, Analyze on SonarCloud

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8
            9
            10

      # Build + test + coverage first
      - name: Build
        run: dotnet build

      - name: Test (with coverage)
        run: dotnet test --no-build --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # Then scan via the action
      - name: SonarQube/SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            "-Dsonar.projectKey=robinrottier_Blazor.Diagrams"
            "-Dsonar.organization=robinrottier"
            "-Dsonar.cs.opencover.reportsPaths=**/TestResults/*/*.xml"
