name: DeployDemoToGitHubPages
env:
  PUBLISH_DIR: site/Site/bin/Release/net10.0/publish/wwwroot
  BASE_HREF: ${{ inputs.base_href || '/Blazor.Diagrams/' }}

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      base_href:
        description: 'Base href (e.g. /Blazor.Diagrams/ for project pages, / for custom domain)'
        required: false
        default: '/Blazor.Diagrams/'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10'

    - name: Publish app
      run: |
        SEGMENTS=$(echo "${{ env.BASE_HREF }}" | grep -o '/' | wc -l)
        SEGMENT_COUNT=$((SEGMENTS - 1))
        sed -i "s/var segmentCount = [0-9]*/var segmentCount = $SEGMENT_COUNT/" site/Site/wwwroot/404.html
        cd site/Site && dotnet publish -c Release /p:BlazorBaseHref=${{ env.BASE_HREF }}

    - uses: actions/configure-pages@v5

    - uses: actions/upload-pages-artifact@v3
      with:
        path: ${{ env.PUBLISH_DIR }}

  deploy:
    name: Deploy Site to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
