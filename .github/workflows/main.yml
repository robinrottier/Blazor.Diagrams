name: DeployDemoToGitHubPages
env:
  PUBLISH_DIR: site/Site/bin/Release/net10.0/publish/wwwroot

on:
  push:
    branches: [ master ]

jobs:
  build:
    name: Deploy Site to GitHub Pages
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10'

    - name: Publish app
      run: cd site/Site && dotnet publish -c Release

    - name: Patch base href and SPA base path
      run: |
        sed -i "s|<base href=\"/\" />|<base href=\"${{ env.BASE_HREF }}\" />|" ${{ env.PUBLISH_DIR }}/index.html
        sed -i "s|var basePath = '/';|var basePath = '${{ env.BASE_HREF }}';|" ${{ env.PUBLISH_DIR }}/404.html

    - uses: actions/configure-pages@v5

    - uses: actions/upload-pages-artifact@v3
      with:
        target_branch: gh-pages
        build_dir: ${{ env.PUBLISH_DIR }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
