<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Blazor.Diagrams</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafrex/spa-github-pages
        // Redirects to the app root with the original route encoded as a query param,
        // so the Blazor router can handle it after the app loads.
        //
        // basePath is patched by the CI workflow for each deployment target:
        //   /Blazor.Diagrams/  -> project pages  (segmentCount would have been 1)
        //   /                  -> custom domain or local dev  (segmentCount would have been 0)
        //
        // Always redirecting to the canonical basePath makes URL matching case-insensitive:
        // e.g. /blazor.diagrams/some-page -> /Blazor.Diagrams/?p=/some-page
        var basePath = '/'; // patched by CI workflow
        var l = window.location;
        var baseSegmentCount = basePath.split('/').filter(Boolean).length;
        var routeParts = l.pathname.split('/').filter(Boolean).slice(baseSegmentCount);
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            basePath + '?p=/' +
            routeParts.join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
</body>
</html>
